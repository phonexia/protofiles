// Phonexia licensing definitions for gRPC API.
syntax = "proto3";

package phonexia.grpc.common;

import "google/protobuf/timestamp.proto";

// Service that implements licensing provider.
service Licensing {
  // Returns information about the license.
  rpc Info (LicensingInfoRequest) returns (LicensingInfoResult);
}

message LicensingInfoRequest {}

// The top-level message returned to the client by <code>LicenseInfo</code>
// method.
message LicensingInfoResult {
  // Validity of a license in YYYY-MM-DD format according to ISO 8601.
  string valid_until = 1;
  // License status, contains "false" if the license has expired.
  bool is_valid = 2;
  // Name of the technology being licensed.
  string technology_name = 3;
  // Information about the licensed model.
  ModelInfo model_info = 4;
  // License flags
  map<string, string> license_flags = 5;
  // Billing counters for this microservice's technology.
  // Only populated when counter-based billing is active, i.e. when the
  // microservice is using a floating license served by the LM-X license server.
  // Node-locked and non-billing licenses leave this field empty.
  // Only the counters relevant to this microservice's technology are included;
  // counters for other technologies held by the same LM-X server are not
  // exposed here.
  repeated BillingCounter billing_counters = 6;
}

message ModelInfo {
  // Name of the model.
  string name = 1;
  // Version of the model.
  string version = 2;
}

message BillingCounter {
    // Counter name
    string name = 1;
    // Current usage of the counter
    uint32 usage = 2;
    // Maximum capacity of the counter
    uint32 capacity = 3;
    // Whether the counter is exhausted
    bool is_exhausted = 4;
    // Reset period (typically "month")
    string reset_period = 5;
    // Timestamp of the current period start date
    google.protobuf.Timestamp period_start = 6;
    // Timestamp of the current period end date
    google.protobuf.Timestamp period_end = 7;
}
