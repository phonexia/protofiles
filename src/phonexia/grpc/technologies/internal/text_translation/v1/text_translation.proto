// Phonexia Text Translation gRPC API.
syntax = "proto3";

package phonexia.grpc.technologies.internal.text_translation.v1;

import "phonexia/grpc/common/core.proto";
import "google/protobuf/duration.proto";

// Service implementing text translation.
service TextTranslation {
  // Performs synchronous text translation from English to the target language of the service.
  // The translation starts after the whole text has been received.
  rpc Translate(stream TranslateRequest) returns (stream TranslateResponse);

  // Method to retrieve information about the service.
  rpc Info(InfoRequest) returns (InfoResponse);
}

// The top-level message sent by the client for the <code>Translate</code> method.
message TranslateRequest {
  // Text segmentation on which the translation should be performed.
  TextSegmentation text_segmentation = 1;
}

// The top-level message returned to the client by the <code>Translate</code> method.
message TranslateResponse {
  // The Text Translation result.
  TranslateResult result = 1;
}

// The top-level message sent by the client for the <code>Info</code> method.
message InfoRequest {
}

// The top-level message returned to the client by the <code>Info</code> method.
message InfoResponse {
  // Source language for translation.
  // The language is specified as an RFC 5646 language tag.
  string source_language = 1;

  // Target language for translation.
  // The language is specified as an RFC 5646 language tag.
  string target_language = 2;
}

// The collection of all translation result formats.
message TranslateResult {
  // Result in text segmentation format.
  // The resulting segmentation corresponds to the input segmentation,
  // meaning that for each input segment, there is exactly one output segment
  // with the same timing information but translated text content.
  TextSegmentation text_segmentation = 1;
}

// The text segmentation.
message TextSegmentation {
  // List of segments.
  repeated Segment segments = 1;
}

// Segment of the text segmentation.
message Segment {
  // Text content of the segment.
  string text = 1;

  // Start time of the segment.
  google.protobuf.Duration start_time = 2;

  // End time of the segment.
  google.protobuf.Duration end_time = 3;
}
