// Phonexia Phoneme Recognition gRPC API.
syntax = "proto3";

package phonexia.grpc.technologies.phoneme_recognition.v1;

import "google/protobuf/duration.proto";
import "phonexia/grpc/common/core.proto";

// Service implementing phoneme recognition.
service PhonemeRecognition {
  // Performs phoneme recognition on the audio data.
  // Returns a stream of recognition results.
  rpc Recognize(stream RecognizeRequest) returns (stream RecognizeResponse);
}

// The top-level message sent by the client for the <code>Recognize</code> method.
message RecognizeRequest {
  // Audio data to process. There is no minimum audio length limit.
  phonexia.grpc.common.Audio audio = 1;
}

// The top-level message returned to the client by the <code>Recognize</code> method.
message RecognizeResponse {
  // List of recognized phonemes with their time boundaries.
  repeated PhonemeSegment phoneme_segments = 1;

  // Total length of processed audio.
  google.protobuf.Duration processed_audio_length = 2;
}

// A single phoneme segment with timing information.
message PhonemeSegment {
  // The recognized phoneme.
  string phoneme = 1;

  // Start time of the phoneme in the audio.
  google.protobuf.Duration start_time = 2;

  // End time of the phoneme in the audio.
  google.protobuf.Duration end_time = 3;
}
