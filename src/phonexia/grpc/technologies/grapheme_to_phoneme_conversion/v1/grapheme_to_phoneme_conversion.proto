// Phonexia Grapheme to Phoneme Conversion gRPC API.
syntax = "proto3";

package phonexia.grpc.technologies.grapheme_to_phoneme_conversion.v1;


// Service implementing grapheme to phoneme conversion.
service GraphemeToPhonemeConversion {
  // Performs grapheme to phoneme conversion.
  // Returns a list of possible pronunciations for each input word.
  rpc Convert(ConvertRequest) returns (ConvertResponse);

  // Returns a list of allowed input symbols for the conversion model.
  rpc ListAllowedGraphemes(ListAllowedGraphemesRequest) returns (ListAllowedGraphemesResponse); // protolint:disable:this MAX_LINE_LENGTH
}


// The top-level message sent by the client for the <code>Convert</code> method.
message ConvertRequest {
  // List of words written in graphemes.
  // Only supported graphemes, listed by <code>ListAllowedGraphemes</code>, can be used.
  // The words may contain multiple sub-words separated by the '+' symbol
  // (e.g. "hello+world").
  repeated string words = 1;
}

// The top-level message returned to the client by the <code>Convert</code> method.
message ConvertResponse {

  // Results for each input word. Each word may have multiple pronunciations.
  repeated WordPronunciations word_pronunciations = 1;
}

// Pronunciations for a single word.
message WordPronunciations {

  // The source word to which the pronunciations belong.
  string word = 1;

  // List of possible pronunciations for the word.
  repeated Pronunciation pronunciations = 2;
}

// A single pronunciation.
message Pronunciation {

  // Source of the pronunciation.
  enum PronunciationSource {

    // The pronunciation is in the model's vocabulary.
    DICTIONARY = 0;

    // The pronunciation has been generated by the system.
    GENERATED = 1;

    // Part of the pronunciation has been generated by the system,
    // the rest of the pronunciation is in the model's vocabulary.
    // Only applicable for words containing the '+' separator.
    PARTLY_GENERATED = 2;
  }

  // The pronunciation written in phonemes separated by spaces.
  string pronunciation = 1;

  // Source of the pronunciation.
  PronunciationSource pronunciation_source = 2;
}

// The top-level message sent by the client for the <code>ListAllowedGraphemes</code> method.
message ListAllowedGraphemesRequest {}

// The top-level message returned to the client by the <code>ListAllowedGraphemes</code> method.
message ListAllowedGraphemesResponse {

  // The list of allowed graphemes.
  repeated string graphemes = 1;
}
